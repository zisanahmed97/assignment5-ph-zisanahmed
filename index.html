<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | github issues tracker</title>
    <!-- geist font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- daisyUI and tailwind -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

 <!-- style.css -->
  <link rel="stylesheet" href="./style.css">



</head>
<body class="bg-gray-100 flex justify-center items-center h-screen">
    <div class="bg-white p-8 rounded shadow w-100 ">
        <img class="mx-auto mb-4" src="./assets/github-logo.png" alt="">
        <h1 class="text-2xl font-bold mb-2 text-center">GitHub Issues Tracker</h1>

<p class="text-[#64748B] mb-4 text-center">Sign in to manage your issues</p>

<label class="text-[#1F2937] font-medium mb-3" for="username">Username</label>

<input id="username"
class="border p-2 w-full mb-3"
placeholder="Enter Username">
<p class="text-[#4A00FF] text-sm mb-4">Default: admin</p>





<label class="text-[#1F2937] font-medium mb-3" for="username">Enter Password</label>
<input id="password"
type="password"
class="border p-2 w-full mb-3"
placeholder="Enter Password">
<p class="text-[#4A00FF] text-sm mb-4">Default: admin123</p>



<button onclick="login()" class="btn btn-primary w-full mb-6">Sign In</button>

<p class="text-[#1F2937] text-sm text-center mb-4">OR</p>

<p class="text-[#64748B] text-center text-sm mb-4">Demo Credentials:</p>

<p class="text-[#1F2937] font-light text-center"><span class="font-medium">Username:</span> admin</p>
<p class="text-[#1F2937] font-light text-center"><span class="font-medium">Password:</span> admin123</p>


    </div>


    <script src="./login.js"></script>
</body>
</html>
