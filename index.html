<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | github issues tracker</title>
    <!-- geist font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- daisyUI and tailwind -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

 <!-- style.css -->
  <link rel="stylesheet" href="./style.css">

</head>
<body class="bg-gray-100">
<div class="flex justify-between items-center bg-white p-4 shadow px-12">

<div class="flex items-center gap-2">
    <img class="w-[38px] " src="./assets/github-logo.png" alt="">
    <h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
</div>


<div class="flex gap-2">

<input id="searchInput"
class="border p-2 rounded"
placeholder="Search issues..">



<button onclick="searchIssue()" class="btn btn-primary px-4 py-2">Search</button>

</div>



</div>






<div class="flex gap-4 p-4 bg-white w-[1200px] mx-auto my-6 ">

<button onclick="loadIssues()" class="btn btn-soft btn-primary w-[100px]">All</button>
<button onclick="filterIssues()" class="btn btn-soft btn-primary w-[100px]">Open</button>
<button onclick="filterIssues()" class="btn btn-soft btn-primary w-[100px]">Closed</button>

</div>


<div class="flex justify-between items-center bg-white p-6 border-b w-[1200px] mx-auto">
   

<div class="flex items-center gap-2">
    <div class="bg-gray-300 p-1 rounded-full">
         <img src="./assets/Aperture.png" alt="">


    </div>
    <div>
        
         <h2 class="text-xl font-semibold">
<span id="issueCount">0</span> Issues
</h2>

<p class="text-gray-500 text-sm">
Track and manage your project issues
</p>
    </div>


</div>

<div class="flex gap-4 text-sm">

<p class="flex items-center gap-2">
<span class="w-3 h-3 bg-green-500 rounded-full"></span>
Open
</p>

<p class="flex items-center gap-2">
<span class="w-3 h-3 bg-purple-500 rounded-full"></span>
Closed
</p>

</div>

</div>




<div id="issuesContainer"
class="grid grid-cols-4 gap-6 p-6 w-[1200px] mx-auto">
</div>

<div id="issueModal"
class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">

<div class="bg-white p-6 rounded w-[400px]">

<h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>

<p id="modalDescription" class="text-gray-600"></p>

<div class="mt-4 text-sm text-gray-500">

<p id="modalAuthor"></p>
<p id="modalCategory"></p>
<p id="modalPriority"></p>

</div>

<button onclick="closeModal()"
class="mt-4 btn btn-soft btn-primary w-[100px]">
Close
</button>

</div>

</div>













 <script src="./script.js"></script>
</body>
</html>
